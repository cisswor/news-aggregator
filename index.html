<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Aggregator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .logo span {
            color: #6366f1;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 6px 14px;
            gap: 8px;
            flex: 1;
            max-width: 320px;
        }

        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: #e2e8f0;
            font-size: 0.9rem;
            width: 100%;
        }

        .search-box input::placeholder {
            color: #475569;
        }

        .refresh-btn {
            background: #6366f1;
            border: none;
            color: #fff;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.85;
        }

        .filters {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0.8rem 2rem;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #94a3b8;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #6366f1;
            color: #f8fafc;
        }

        .filter-btn.active {
            background: #6366f1;
            border-color: #6366f1;
            color: #fff;
        }

        .stats {
            padding: 1rem 2rem;
            font-size: 0.85rem;
            color: #475569;
        }

        .feed {
            padding: 0 2rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .source-badge {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .badge-tech {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .badge-world {
            background: #1a3a2a;
            color: #4ade80;
        }

        .badge-business {
            background: #3a2a1a;
            color: #fb923c;
        }

        .points {
            font-size: 0.78rem;
            color: #475569;
            white-space: nowrap;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #f1f5f9;
            line-height: 1.5;
        }

        .card-desc {
            font-size: 0.82rem;
            color: #64748b;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .card-source {
            font-size: 0.78rem;
            color: #475569;
        }

        .read-more {
            font-size: 0.78rem;
            color: #6366f1;
            font-weight: 500;
        }

        /* Loading */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: #475569;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Empty state */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: #475569;
        }

        .empty h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        /* Last updated */
        .last-updated {
            font-size: 0.78rem;
            color: #334155;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">News<span>Feed</span></div>
        <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" id="search-input" placeholder="Search headlines..." oninput="filterArticles()" />
        </div>
        <button class="refresh-btn" onclick="loadNews()">Refresh</button>
    </header>

    <div class="filters">
        <button class="filter-btn active" onclick="setCategory('all', this)">All</button>
        <button class="filter-btn" onclick="setCategory('tech', this)">Tech</button>
        <button class="filter-btn" onclick="setCategory('world', this)">World</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="feed" id="feed">
        <div class="loading">
            <div class="spinner"></div>
            <p>Fetching latest headlines...</p>
        </div>
    </div>

    <div class="last-updated" id="last-updated"></div>

    <script>
        let allArticles = [];
        let currentCategory = 'all';

        async function loadNews() {
            document.getElementById('feed').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Fetching latest headlines...</p>
        </div>`;
            document.getElementById('stats').textContent = '';

            try {
                const res = await fetch('http://127.0.0.1:5000/api/news');
                allArticles = await res.json();
                filterArticles();

                const now = new Date();
                document.getElementById('last-updated').textContent =
                    `Last updated: ${now.toLocaleTimeString()}`;
            } catch (err) {
                document.getElementById('feed').innerHTML = `
          <div class="empty">
            <h3>Could not connect to server</h3>
            <p>Make sure your Python backend is running on port 5000</p>
          </div>`;
            }
        }

        function setCategory(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterArticles();
        }

        function filterArticles() {
            const query = document.getElementById('search-input').value.toLowerCase();
            let filtered = allArticles;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(a => a.category === currentCategory);
            }

            if (query) {
                filtered = filtered.filter(a =>
                    a.title.toLowerCase().includes(query) ||
                    (a.description && a.description.toLowerCase().includes(query))
                );
            }

            renderArticles(filtered);
        }

        function renderArticles(articles) {
            const feed = document.getElementById('feed');
            const stats = document.getElementById('stats');

            stats.textContent = `${articles.length} articles found`;

            if (articles.length === 0) {
                feed.innerHTML = `
          <div class="empty">
            <h3>No articles found</h3>
            <p>Try a different search or category</p>
          </div>`;
                return;
            }

            feed.innerHTML = articles.map(article => `
        <a class="card" href="${article.link}" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <span class="source-badge badge-${article.category}">${article.source}</span>
            ${article.points ? `<span class="points">${article.points} pts</span>` : ''}
          </div>
          <div class="card-title">${article.title}</div>
          ${article.description ? `<div class="card-desc">${article.description}</div>` : ''}
          <div class="card-footer">
            <span class="card-source">${article.category}</span>
            <span class="read-more">Read more →</span>
          </div>
        </a>
      `).join('');
        }

        // Auto refresh every 5 minutes
        setInterval(loadNews, 5 * 60 * 1000);

        // Load on start
        loadNews();
    </script>

</body>

</html>
